<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VG Matchmaking BR</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/socket.io/socket.io.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a18;
    --surface:   #111120;
    --border:    #1e1e3a;
    --border2:   #2a2a50;
    --text:      #7070a0;
    --text-dim:  #44446a;
    --white:     #f0f0ff;
    --green:     #39ff7e;
    --yellow:    #ffe04b;
    --blue:      #3bbfff;
    --red:       #ff5555;
    --purple:    #b87fff;
    --green-dim: #1a3325;
    --red-dim:   #2d1010;
    --blue-dim:  #0d2233;
    --radius:    10px;
    --font-mono: 'Share Tech Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--yellow);
    letter-spacing: 2px;
  }
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 1;
    min-width: 70px;
    padding: 10px 8px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--yellow);
    border-bottom-color: var(--yellow);
  }

  /* ── PAGES ── */
  .page { display: none; padding: 12px; }
  .page.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  /* ── STATUS DOTS ── */
  .status-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-blue  { background: var(--blue);  box-shadow: 0 0 6px var(--blue); }
  .dot-purple{ background: var(--purple);box-shadow: 0 0 6px var(--purple); }
  .dot-yellow{ background: var(--yellow);box-shadow: 0 0 6px var(--yellow); }
  .stat-label { color: var(--text); flex: 1; }
  .stat-value { color: var(--white); font-weight: bold; font-size: 15px; }
  .stat-sub   { color: var(--text-dim); font-size: 11px; }

  /* ── PLAYER CARD ── */
  .player-nick {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 1px;
  }
  .player-fc {
    font-size: 20px;
    color: var(--yellow);
    font-weight: bold;
  }
  .player-rank { color: var(--purple); font-size: 13px; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .stat-box {
    background: #0d0d20;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .stat-box-val {
    font-size: 22px;
    font-weight: bold;
  }
  .stat-box-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }

  /* ── QUEUE BUTTONS ── */
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { transform: scale(.96); }
  .btn-green  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .btn-red    { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red); }
  .btn-blue   { background: var(--blue-dim);  color: var(--blue);  border: 1px solid var(--blue); }
  .btn-yellow { background: #2a2200; color: var(--yellow); border: 1px solid var(--yellow); }
  .btn-purple { background: #1e0e33; color: var(--purple); border: 1px solid var(--purple); }
  .btn-gray   { background: #1a1a2e; color: var(--text);   border: 1px solid var(--border2); }
  .btn-full   { flex: none; width: 100%; margin-top: 8px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── RANKING TABLE ── */
  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-pos { width: 28px; text-align: center; font-size: 16px; flex-shrink: 0; }
  .rank-nick { flex: 1; color: var(--white); font-size: 15px; font-weight: 600; }
  .rank-fc   { color: var(--green); font-size: 13px; }
  .rank-games{ color: var(--text-dim); font-size: 11px; }
  .rank-wr   { color: var(--blue); font-size: 11px; }

  /* ── MATCH CARD ── */
  .match-banner {
    background: linear-gradient(135deg, #0d1a2a, #0a0a18);
    border: 1px solid var(--blue);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    text-align: center;
    animation: glow-border 2s infinite;
  }
  @keyframes glow-border {
    0%,100%{ box-shadow: 0 0 8px rgba(59,191,255,.3); }
    50%    { box-shadow: 0 0 20px rgba(59,191,255,.6); }
  }
  .match-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--yellow);
    letter-spacing: 2px;
  }
  .sniping-code {
    font-size: 36px;
    font-weight: bold;
    color: var(--white);
    letter-spacing: 8px;
    margin: 8px 0;
  }
  .nick-format {
    font-size: 16px;
    color: var(--green);
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 6px 12px;
    display: inline-block;
    margin: 6px 0;
  }
  .confirm-dots { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
  .confirm-dot  {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border2);
    background: #0a0a18;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .3s;
  }
  .confirm-dot.done { border-color: var(--green); background: var(--green-dim); }

  /* ── COUNTDOWN ── */
  .countdown-num {
    font-size: 80px;
    font-weight: 700;
    color: var(--yellow);
    text-align: center;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,224,75,.5);
    transition: all .3s;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin: 12px 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 3px;
    transition: width .9s linear;
  }

  /* ── NEWS ── */
  .news-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .news-item:last-child { border-bottom: none; }
  .news-bullet { color: var(--yellow); flex-shrink: 0; }
  .news-text   { color: var(--white); line-height: 1.5; }
  .news-time   { color: var(--text-dim); font-size: 10px; margin-top: 2px; }

  /* ── PENALTY CARD ── */
  .penalty-card {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    text-align: center;
  }
  .penalty-title { color: var(--red); font-size: 18px; font-weight: 700; }
  .penalty-exp   { color: var(--yellow); font-size: 12px; margin-top: 6px; }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    gap: 12px;
    color: var(--text-dim);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--white);
    opacity: 0;
    pointer-events: none;
    transition: all .3s;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── ALLY LIST ── */
  .ally-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .ally-row:last-child { border-bottom: none; }
  .ally-nick { color: var(--white); font-size: 14px; }
  .ally-fc   { color: var(--yellow); font-size: 12px; }

  .not-registered {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    line-height: 2;
  }
  .not-registered .icon { font-size: 40px; margin-bottom: 8px; }

  /* ── COLOR CLASSES ── */
  .g  { color: var(--green); }
  .y  { color: var(--yellow); }
  .b  { color: var(--blue); }
  .r  { color: var(--red); }
  .p  { color: var(--purple); }
  .w  { color: var(--white); font-weight: 600; }
  .d  { color: #252545; }
  .dim{ color: var(--text-dim); }
  .s  { color: var(--border2); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">⚡ VG BR</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="conn-label" style="font-size:10px;color:var(--text-dim)">conectando...</span>
    <div class="pulse-dot" id="conn-dot" style="background:var(--text-dim);box-shadow:none"></div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="lobby">🏠 SAGUÃO</div>
  <div class="tab" data-tab="match">⚔ PARTIDA</div>
  <div class="tab" data-tab="profile">👤 PERFIL</div>
  <div class="tab" data-tab="ranking">🏆 RANKING</div>
</div>

<!-- PAGES -->
<div id="page-lobby"   class="page active"></div>
<div id="page-match"   class="page"></div>
<div id="page-profile" class="page"></div>
<div id="page-ranking" class="page"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── TELEGRAM WEBAPP ──────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a18');
  tg.setBackgroundColor('#0a0a18');
}

const TG_USER = tg?.initDataUnsafe?.user || null;
const USER_ID = TG_USER?.id || null;

// ─── STATE ────────────────────────────────────────────────────────────────────
let globalState  = null;
let playerData   = null;
let matchData    = null;
let countdownInt = null;
let countdownVal = 10;
let activeTab    = 'lobby';

// ─── SOCKET.IO ────────────────────────────────────────────────────────────────
const socket = io({ transports: ['websocket'] });

socket.on('connect', () => {
  setConnected(true);
  if (USER_ID) socket.emit('join_player', USER_ID);
});
socket.on('disconnect', () => setConnected(false));

socket.on('state_update', (state) => {
  globalState = state;
  if (activeTab === 'lobby')   renderLobby();
  if (activeTab === 'ranking') renderRanking();
});

socket.on('match_found', ({ matchId }) => {
  showToast('⚔ Partida encontrada!');
  if (tg) tg.showAlert('⚔ PARTIDA ENCONTRADA!\n\nAbra a aba PARTIDA para ver os detalhes.');
  switchTab('match');
  loadMatch();
});

socket.on('countdown_start', ({ matchId }) => {
  showToast('⏱ Contagem regressiva iniciando!');
  switchTab('match');
  startCountdown();
});

socket.on('result_request', ({ matchId, team }) => {
  showToast('🏁 Reporte o resultado!');
  switchTab('match');
  loadMatch();
});

function setConnected(ok) {
  document.getElementById('conn-dot').style.background    = ok ? 'var(--green)' : 'var(--red)';
  document.getElementById('conn-dot').style.boxShadow     = ok ? '0 0 8px var(--green)' : 'none';
  document.getElementById('conn-label').textContent       = ok ? 'ao vivo' : 'desconectado';
  document.getElementById('conn-label').style.color       = ok ? 'var(--green)' : 'var(--red)';
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === `page-${name}`));
  if (name === 'lobby')   { loadState(); renderLobby(); }
  if (name === 'match')   loadMatch();
  if (name === 'profile') loadProfile();
  if (name === 'ranking') { loadState(); renderRanking(); }
}

// ─── DATA LOADING ─────────────────────────────────────────────────────────────
async function loadState() {
  try {
    const r = await fetch('/api/state');
    globalState = await r.json();
  } catch(e) {}
  renderLobby();
  renderRanking();
}

async function loadProfile() {
  if (!USER_ID) { renderProfile(null); return; }
  markPresence();
  try {
    const r = await fetch(`/api/player/${USER_ID}`);
    playerData = r.ok ? await r.json() : null;
  } catch(e) { playerData = null; }
  renderProfile(playerData);
}

async function loadMatch() {
  if (!USER_ID) { renderMatch(null); return; }
  try {
    const r = await fetch(`/api/match/${USER_ID}`);
    matchData = r.ok ? await r.json() : { inMatch: false };
  } catch(e) { matchData = { inMatch: false }; }
  renderMatch(matchData);
}

async function markPresence() {
  if (!USER_ID) return;
  try { await fetch('/api/presence', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ telegramId: USER_ID }) }); }
  catch(e) {}
}

// ─── RENDER: LOBBY ────────────────────────────────────────────────────────────
function renderLobby() {
  const el = document.getElementById('page-lobby');
  if (!globalState) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div><span>Carregando...</span></div>`;
    return;
  }
  const s = globalState;
  
  // Get player info if available
  let playerInfo = '';
  if (playerData) {
    playerInfo = `<span class="dim">👤 JOGADOR</span>
<span class="w">   ${playerData.nick}</span>
<span class="dim">   FC:</span> <span class="y">${playerData.fc || '?'}</span>  <span class="dim">|  Rank:</span> <span class="p">#${playerData.rank || '?'} BR</span>`;
  }

  let html = `<div class="card"><span class="y">⚡ VG MATCHMAKING BR</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

${playerInfo}
${playerInfo ? '<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>' : ''}

<span class="dim">📡 STATUS ATUAL</span>
<span class="g">   ⬤ Online</span>     <span class="w">${s.online}</span> <span class="dim">jogadores</span>
<span class="b">   ◈ Buscando</span>   <span class="w">${s.searching}</span> <span class="dim">jogadores</span>
<span class="p">   ⬡ Em Jogo</span>    <span class="w">${s.inGame}</span> <span class="dim">partida(s)</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">⚔  FILAS ABERTAS</span>
<span class="g">   3v3 Casual</span>  <span class="y">${s.queue3v3}</span><span class="dim">/6</span>
<span class="dim">   5v5 Ranked   ${s.queue5v5}/10</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">🎯 ENTRAR 3v3   ⚡ ENTRAR 5v5</span>
<span class="dim">❌ SAIR DA FILA    👤 PERFIL</span></div>`;

  el.innerHTML = html;
}

// ─── RENDER: MATCH ────────────────────────────────────────────────────────────
function renderMatch(data) {
  const el = document.getElementById('page-match');
  if (!data) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    return;
  }
  if (!data.inMatch) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:30px">
<div style="font-size:40px;margin-bottom:12px">⏳</div>
<div style="color:var(--white);font-size:16px">Nenhuma partida ativa</div>
<div style="color:var(--text-dim);margin-top:6px">Entre em uma fila pelo bot para encontrar uma partida</div>
</div>`;
    return;
  }

  const allies = (data.allies || []).map(a => `<span class="dim">   ▸</span> <span class="w">${a.nick}</span>    <span class="dim">FC ${a.fc}</span>`).join('\n');
  const enemies = Array.from({ length: data.total / 2 }, () => '<span class="dim">   ▸ oculto</span>').join(' ');
  
  const confirmStatus = data.iConfirmed
    ? `<span class="g">✅ Nick alterado</span>`
    : `<span class="r">❌ Não consigo mudar</span>`;

  const confirmDots = Array.from({ length: data.total }, (_, i) =>
    i < data.confirmed ? '<span class="g">✔</span>' : '<span class="dim">□</span>'
  ).join(' ');

  el.innerHTML = `<div class="card"><span class="y">⚔  PARTIDA ENCONTRADA</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">🆔 ID DA PARTIDA</span>
<span class="w">   #${data.matchId}</span>  <span class="dim">|  Modo:</span> <span class="g">${data.mode === '3v3' ? '3v3 Casual' : '5v5 Ranked'}</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="g">🟦 SEU TIME</span>
${allies}

<span class="r">🟥 ADVERSÁRIOS</span>
<span class="dim">   ▸ oculto ▸ oculto ▸ oculto</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">🎯 SNIPING CODE</span>
<span class="w">   ${data.snipingCode}</span>

<span class="dim">📝 MUDE SEU NICK PARA</span>
<span class="g">   ${data.myNickFormat}SeuNick</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">✅ CONFIRMAÇÕES</span>
<span class="dim">   </span><span class="g">${confirmDots}</span><span class="dim">  (${data.confirmed}/${data.total})</span>

<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>
${confirmStatus}</div>

<div id="countdown-section" style="display:none" class="card"><span class="y">⚔  PARTIDA #${data.matchId}</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="g">✔ Todos confirmados!</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">⏱ BUSCA INICIANDO EM</span>

<span class="w">          <span id="cd-num">10</span></span>

}

function startCountdown() {
  clearInterval(countdownInt);
  countdownVal = 10;
  const section = document.getElementById('countdown-section');
  if (section) section.style.display = 'block';
  countdownInt = setInterval(() => {
    countdownVal--;
    const numEl = document.getElementById('cd-num');
    const barEl = document.getElementById('cd-bar');
    if (numEl) numEl.textContent = countdownVal;
    if (barEl) {
      const filled = Math.round((10 - countdownVal) / 10 * 20);
      barEl.textContent = '█'.repeat(filled) + '░'.repeat(20 - filled);
    }
    if (countdownVal <= 0) {
      clearInterval(countdownInt);
      showToast('🎯 BUSQUEM AGORA!');
      if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }
  }, 1000);
}

// ─── RENDER: RANKING ──────────────────────────────────────────────────────────
function renderRanking() {
  const el = document.getElementById('page-ranking');
  if (!globalState?.ranking) {
    el.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const rows = globalState.ranking.map((p, i) => {
    const medal = i < 3 ? medals[i] : ` ${i + 1}`;
    const fc = p.penalty ? '💀' : p.fc;
    return `<span class="dim">   ${medal}</span> <span class="w">${p.nick}</span>      <span class="g">${fc}</span>  <span class="dim">${p.games}</span>`;
  }).join('\n');

  el.innerHTML = `<div class="card"><span class="y">🏆 TOP PLAYERS BR</span>
<span class="dim">━━━━━━━━━━━━━━━━━━━━━━</span>

<span class="dim">   NICK         FC    JOGOS</span>
<span class="dim">   ──────────────────────</span>
${rows}
<span class="dim">   ──────────────────────</span>
<span class="dim">   Mín. 10 partidas para rankear</span></div>`;
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (tg) tg.HapticFeedback?.impactOccurred('light');
  setTimeout(() => t.classList.remove('show'), 3000);
}
